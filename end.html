<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Happy Birthday Shivani</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="end">
  <canvas id="fx-canvas" aria-hidden="true"></canvas>
  <main class="stage end-stage">
    <section id="byeScene" class="scene active goodbye-scene">
      <div id="byeCat" class="cat sit bye-cat face-right" aria-hidden="true">
        <span class="bow"></span>
        <span class="ear left"></span><span class="ear right"></span>
        <span class="head"><i class="eye left"></i><i class="eye right"></i><i class="nose"></i><i class="mouth talking"></i></span>
        <span class="body"></span><span class="tail"></span><span class="paw-wave"></span>
      </div>
      <div id="byeBubble" class="speech-bubble bye-bubble">Bye, Shivani!</div>
    </section>
    <section id="finalScene" class="scene final-screen">
      <h1>✨ THE END ✨</h1>
      <p>Dedicated to</p>
      <h2>Shivani Adhikari</h2>
      <div>💗🐾</div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
