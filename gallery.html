<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Beautiful Moments</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="gallery">
  <canvas id="fx-canvas" aria-hidden="true"></canvas>
  <main class="stage gallery-stage">
    <h1 class="page-title">Beautiful Moments</h1>
    <div class="photo-line" aria-label="Hanging birthday photos">
      <figure class="polaroid"><img src="assets/photo1.jpg" alt="Beautiful moment 1"></figure>
      <figure class="polaroid"><img src="assets/photo3.jpg" alt="Beautiful moment 3"></figure>
      <figure class="polaroid"><img src="assets/photo4.jpg" alt="Beautiful moment 4"></figure>
      <figure class="polaroid"><img src="assets/photo5.jpg" alt="Beautiful moment 5"></figure>
      <figure class="polaroid"><img src="assets/photo2.jpg" alt="Beautiful moment 2"></figure>
    </div>
    <p class="gallery-wish">Wishing you<br>happiness,<br>love,<br>success,<br>and endless smiles.<br><br>May all your dreams come true!</p>
  </main>
  <script src="script.js"></script>
</body>
</html>
