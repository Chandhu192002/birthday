<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Last Birthday Memories</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="video">
  <canvas id="fx-canvas" aria-hidden="true"></canvas>
  <main class="stage video-stage">
    <h1 class="page-title">Last Birthday Memories</h1>
    <video id="birthdayVideo" class="memory-video" src="assets/birthday-video.mp4" autoplay playsinline controls></video>
    <div class="cat sit video-cat face-right" aria-hidden="true">
      <span class="bow"></span>
      <span class="ear left"></span><span class="ear right"></span>
      <span class="head"><i class="eye left"></i><i class="eye right"></i><i class="nose"></i><i class="mouth"></i></span>
      <span class="body"></span><span class="tail"></span>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
